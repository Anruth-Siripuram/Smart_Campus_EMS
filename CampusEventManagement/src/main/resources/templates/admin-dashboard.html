<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

    <!-- TOP BAR -->
    <div class="topbar">
        <h2>Admin Dashboard</h2>

        <div>
            <form action="/admin/add" style="display:inline;">
                <button type="submit">+ Add Event</button>
            </form>

            <form action="/admin/cancellations" style="display:inline;">
                <button type="submit">Requests</button>
            </form>

            <form action="/admin/stats" style="display:inline;">
                <button type="submit">Stats</button>
            </form>

            <form action="/logout" style="display:inline;">
                <button type="submit" class="secondary">Logout</button>
            </form>
        </div>
    </div>

    <!-- ERROR -->
    <div th:if="${error}" style="
        background: rgba(255,80,80,0.15);
        border: 1px solid rgba(255,80,80,0.4);
        padding: 10px;
        border-radius: 10px;
        margin: 15px 0;
        text-align: center;
        color: #ff5050;
        font-weight: 600;">
        <span th:text="${error}"></span>
    </div>

    <!-- EVENTS -->
    <div class="grid">

        <div class="card event-card" th:each="e : ${events}">

            <h3 th:text="${e.name}"></h3>

            <p>📅 
                <span th:text="${#temporals.format(e.dateTime, 'dd MMM yyyy, HH:mm')}"></span>
            </p>

            <p>🎟 Available: 
                <span th:text="${e.availableTickets}"></span>
            </p>

            <p>📍 
                <span th:text="${e.venue}"></span>
            </p>

            <!-- ACTIVE BOOKINGS -->
            <p style="font-size:0.85rem; opacity:0.7;">
                Active Bookings:
                <span th:text="${activeCounts[e.id]}"></span>
            </p>

            <hr>

            <div>

                <!-- EDIT -->
                <form th:action="@{'/admin/edit/' + ${e.id}}" method="get" style="display:inline;">
                    <button type="submit" class="secondary">Edit</button>
                </form>

                <!-- DELETE -->
                <form action="/admin/delete" method="post" style="display:inline;">
                    <input type="hidden" name="id" th:value="${e.id}">

                    <button type="submit"
                            class="danger"
                            th:disabled="${activeCounts[e.id] > 0}">
                        Delete
                    </button>
                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
