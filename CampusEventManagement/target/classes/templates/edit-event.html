<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Event</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

    <!-- 🔝 TOP BAR -->
    <div class="topbar">
        <h2>Edit Event</h2>

        <form action="/admin/dashboard">
            <button type="submit" class="secondary">Back</button>
        </form>
    </div>

    <!-- 🧊 FORM CARD -->
    <div class="card">

        <form action="/admin/add" method="post">

            <input type="hidden" name="id" th:value="${event.id}">

            <label>Event Name</label>
            <input name="name" th:value="${event.name}" required>

            <label>Description</label>
            <input name="description" th:value="${event.description}" required>

            <label>Venue</label>
            <input name="venue" th:value="${event.venue}" required>

            <label>Date & Time</label>
            <input type="datetime-local" name="dateTime"
                   th:value="${#temporals.format(event.dateTime, 'yyyy-MM-dd''T''HH:mm')}" required>

            <label>Total Tickets</label>
            <input type="number" name="totalTickets" th:value="${event.totalTickets}" required>

            <label>Ticket Price (₹)</label>
            <input type="number" name="price" th:value="${event.price}" required>

            <label>Event Type</label>
            <select name="type">
                <option value="TECH" th:selected="${event.type == 'TECH'}">Technical</option>
                <option value="NON_TECH" th:selected="${event.type == 'NON_TECH'}">Non-Technical</option>
                <option value="FREE" th:selected="${event.type == 'FREE'}">Free</option>
                <option value="PAID" th:selected="${event.type == 'PAID'}">Paid</option>
            </select>

            <br>

            <!-- 🔘 ACTION BUTTON -->
            <button type="submit">Update Event</button>

        </form>

    </div>

</div>

</body>
</html>
